name: Static Linux musl Binary

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-linux-musl
  BINARY_NAME: cgdiff

jobs:
  build:
    name: Build x86-64 musl binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.TARGET }}

      - name: Build static binary
        run: cargo build --release --locked --target "${TARGET}"

      - name: Verify binary
        run: |
          file "target/${TARGET}/release/${BINARY_NAME}"
          ldd "target/${TARGET}/release/${BINARY_NAME}" 2>&1 | grep -Eq "not a dynamic executable|statically linked"

      - name: Package binary
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          chmod 755 "dist/${BINARY_NAME}"
          tar -C dist -czf "${BINARY_NAME}-${TARGET}.tar.gz" "${BINARY_NAME}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.TARGET }}
          path: ${{ env.BINARY_NAME }}-${{ env.TARGET }}.tar.gz
          if-no-files-found: error
