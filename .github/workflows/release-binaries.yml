name: Release Binaries

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: cgdiff

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86-64 musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-musl
          - label: Linux aarch64 musl
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            platform: linux-musl
          - label: macOS aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            platform: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Verify Linux musl binary
        if: matrix.platform == 'linux-musl'
        run: |
          file "target/${{ matrix.target }}/release/${BINARY_NAME}" | tee binary-file.txt
          grep -Eq "(static-pie|statically) linked" binary-file.txt

      - name: Verify macOS binary
        if: matrix.platform == 'macos'
        run: |
          file "target/${{ matrix.target }}/release/${BINARY_NAME}" | tee binary-file.txt
          grep -q "arm64" binary-file.txt

      - name: Package binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          chmod 755 "dist/${BINARY_NAME}"
          tar -C dist -czf "${BINARY_NAME}-${{ matrix.target }}.tar.gz" "${BINARY_NAME}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error
